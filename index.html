<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fuel-log v7.2 - Tokyo Tower Edition</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f5; --card-bg: #ffffff; --header-bg: #d32f2f; /* タワーレッド */
            --text-main: #333333; --text-sub: #666666; --accent: #ff5252;
            --month-bar: #ffebee; --month-text: #b71c1c; --border: #eeeeee;
            --input-bg: #ffffff; --warn: #e74c3c; --map: #27ae60; --eff: #e67e22; --tower: #d32f2f;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212; --card-bg: #1e1e1e; --header-bg: #000000; --text-main: #e0e0e0;
                --text-sub: #aaaaaa; --accent: #ff5252; --month-bar: #2c1a1a; --month-text: #ff8a80;
                --border: #333333; --input-bg: #2c2c2c;
            }
        }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text-main); padding-bottom: 50px; transition: 0.3s; }
        header { background: var(--header-bg); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .form-box { background: var(--card-bg); margin: 10px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .form-box input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-size: 16px; background: var(--input-bg); color: var(--text-main); }
        .btn-save { background: var(--header-bg); color: white; border: none; width: 100%; padding: 12px; border-radius: 6px; font-weight: bold; margin-top: 10px; }
        .tab-bar { display: flex; overflow-x: auto; background: var(--card-bg); border-bottom: 1px solid var(--border); }
        .tab { padding: 12px 20px; white-space: nowrap; cursor: pointer; color: var(--text-sub); border-bottom: 3px solid transparent; }
        .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); font-weight: bold; }
        .month-header { background: var(--month-bar); padding: 10px 15px; border-left: 5px solid var(--tower); font-size: 0.8rem; display: flex; flex-direction: column; margin-top: 15px; font-weight: bold; color: var(--month-text); }
        .card { background: var(--card-bg); padding: 15px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .card .date { grid-column: 1/3; font-weight: bold; color: var(--text-main); display: flex; justify-content: space-between; }
        .card .eff { text-align: right; color: var(--eff); font-weight: bold; font-size: 1.2rem; }
        .tower-badge { grid-column: 1/3; font-size: 0.75rem; color: var(--tower); margin-top: 4px; display: flex; align-items: center; gap: 4px; font-weight: bold; }
        .map-link { color: var(--map); text-decoration: none; font-size: 0.75rem; font-weight: bold; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; overflow-y: auto; }
        .modal-content { background: var(--card-bg); margin: 20px; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

<header>
    <div id="current-car-display">読み込み中...</div>
    <button onclick="toggleModal()" style="background:none; border:none; color:white; font-size: 1.4rem;"><i class="fas fa-broadcast-tower"></i></button>
</header>

<div class="tab-bar" id="car-tabs"></div>

<div class="form-box">
    <input type="hidden" id="edit-id">
    <input type="number" id="dist" placeholder="走行距離 (km)" inputmode="decimal">
    <div style="display:flex; gap:10px;">
        <input type="number" id="fuel" placeholder="給油量 (L)" inputmode="decimal">
        <input type="number" id="price" placeholder="金額 (円)" inputmode="numeric">
    </div>
    <input type="text" id="memo" placeholder="メモ・走行ルート">
    <button class="btn-save" id="btn-submit" onclick="addRecord()">記録を保存する</button>
    <button id="btn-cancel" style="display:none; background:#999;" class="btn-save" onclick="cancelEdit()">中止</button>
</div>

<div id="list-container"></div>

<div id="modal">
    <div class="modal-content">
        <h3><i class="fas fa-chart-line"></i> 走行統計</h3>
        <div id="stats-area" style="background:var(--bg); padding:15px; border-radius:8px; font-size:0.9rem; line-height:1.8;"></div>
        <hr>
        <button class="btn-save" onclick="toggleModal()">閉じる</button>
    </div>
</div>

<script>
// --- Firebase Config ---
const firebaseConfig = {
    apiKey: "AIzaSyBP_FmmHPoTKJ0c73syYfJGcf88JMca_aI",
    authDomain: "fuel-consumption-log-102e0.firebaseapp.com",
    projectId: "fuel-consumption-log-102e0",
    storageBucket: "fuel-consumption-log-102e0.firebasestorage.app",
    messagingSenderId: "662071411255",
    appId: "1:662071411255:web:f907cbf3dbd0920bb175b2",
    measurementId: "G-NWNNFXQDE2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentCarIndex = 0;
let carNames = JSON.parse(localStorage.getItem('carNames')) || ["車両1", "車両2", "車両3", "車両4", "車両5"];
const TOWER_H = 0.333; // 東京タワーの高さ(km)

function init() {
    renderTabs();
    loadRecords();
}

// 位置情報を取得する関数
function getPosition() {
    return new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(resolve, () => resolve(null), {timeout: 6000});
    });
}

async function addRecord() {
    const d = parseFloat(document.getElementById('dist').value);
    const f = parseFloat(document.getElementById('fuel').value);
    const p = parseFloat(document.getElementById('price').value);
    const m = document.getElementById('memo').value;
    const editId = document.getElementById('edit-id').value;
    if(!d || !f || !p) return alert("数値を入力してください");

    try {
        if(editId) {
            // 修正時は位置情報を更新しない
            await db.collection("records").doc(editId).update({ dist: d, fuel: f, price: p, memo: m });
        } else {
            // 新規登録時のみ位置情報を取得
            const pos = await getPosition();
            let loc = null;
            if(pos) loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };

            await db.collection("records").add({
                carId: currentCarIndex, dist: d, fuel: f, price: p, memo: m,
                loc: loc,
                date: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
        cancelEdit();
        loadRecords();
    } catch (e) {
        alert("エラー: " + e.message);
    }
}

async function loadRecords() {
    const listDiv = document.getElementById('list-container');
    try {
        const snap = await db.collection("records").where("carId", "==", currentCarIndex).orderBy("date", "desc").get();
        let html = ""; let curM = ""; let mF = 0; let mP = 0; let mC = "";
        let tF = 0; let tP = 0; let maxD = 0; let minD = 0;
        const docs = snap.docs;

        if (docs.length === 0) {
            listDiv.innerHTML = "<p style='text-align:center;padding:20px;'>記録なし</p>";
            return;
        }

        docs.forEach((doc, i) => {
            const d = doc.data(); 
            const dt = d.date ? d.date.toDate() : new Date();
            const mS = `${dt.getFullYear()}年${dt.getMonth()+1}月`;
            
            let eff = "---";
            let towerInfo = "";
            if(i < docs.length - 1) {
                const diff = d.dist - docs[i+1].data().dist;
                eff = (diff / d.fuel).toFixed(2);
                towerInfo = `<div class="tower-badge"><i class="fas fa-broadcast-tower"></i> 東京タワー ${(diff/TOWER_H).toFixed(1)} 本分</div>`;
            }

            if (curM !== "" && curM !== mS) { html += renderMS(curM, mF, mP, mC); mF = 0; mP = 0; mC = ""; }
            curM = mS; mF += d.fuel; mP += d.price; tF += d.fuel; tP += d.price;
            if(i === 0) maxD = d.dist;
            minD = d.dist;

            let mapBtn = d.loc ? `<a class="map-link" href="https://www.google.com/maps?q=${d.loc.lat},${d.loc.lng}" target="_blank"><i class="fas fa-map-marker-alt"></i> マップ</a>` : "";

            mC += `<div class="card">
                    <div class="date">${dt.getMonth()+1}/${dt.getDate()} <span>${Math.round(d.price/d.fuel)}円/L</span></div>
                    ${towerInfo}
                    <div style="grid-column:1/3;font-size:0.8rem;color:var(--text-sub);">累計: ${d.dist.toLocaleString()} km </div>
                    <div style="grid-column:1/3; display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:0.85rem;">${d.fuel}L / ¥${d.price.toLocaleString()}</span>
                        <div class="actions" style="display:flex; gap:10px; color:#aaa;">
                            ${mapBtn}
                            <i class="fas fa-edit" onclick="editMode('${doc.id}',${d.dist},${d.fuel},${d.price},'${d.memo||''}')"></i>
                        </div>
                    </div>
                    <div class="eff" style="grid-column:2/3; margin-top:-20px;">${eff} <small style="font-size:0.6rem;">km/L</small></div>
                  </div>`;
        });
        html += renderMS(curM, mF, mP, mC);
        listDiv.innerHTML = html;
        
        const totalDist = maxD - minD;
        document.getElementById('stats-area').innerHTML = `
            <b>生涯走行距離:</b> ${totalDist.toLocaleString()} km<br>
            <b>タワー合計本数:</b> <span style="color:var(--tower)">${(totalDist/TOWER_H).toFixed(0).toLocaleString()} 本分</span><br>
            <b>生涯平均燃費:</b> ${(tF>0?(totalDist/tF).toFixed(2):0)} km/L
        `;
    } catch (e) {
        listDiv.innerHTML = "読込エラー。Firebaseのインデックス等を確認してください。";
    }
}

function renderMS(t, f, p, c) { return `<div class="month-header">${t} <div>¥${p.toLocaleString()} / ${f.toFixed(1)}L</div></div>${c}`; }
function cancelEdit() { document.getElementById('edit-id').value = ""; document.querySelectorAll('.form-box input').forEach(i => i.value=""); document.getElementById('btn-submit').innerText="記録を保存する"; document.getElementById('btn-cancel').style.display="none"; }
function editMode(id, d, f, p, m) { document.getElementById('edit-id').value = id; document.getElementById('dist').value = d; document.getElementById('fuel').value = f; document.getElementById('price').value = p; document.getElementById('memo').value = m; document.getElementById('btn-submit').innerText="修正を保存"; document.getElementById('btn-cancel').style.display="block"; window.scrollTo(0,0); }
function toggleModal() { const m = document.getElementById('modal'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
function renderTabs() { 
    document.getElementById('car-tabs').innerHTML = carNames.map((n, i) => `<div class="tab ${i===currentCarIndex?'active':''}" onclick="currentCarIndex=${i};renderTabs();loadRecords();">${n}</div>`).join(''); 
    document.getElementById('current-car-display').innerText = carNames[currentCarIndex]; 
}

init();
</script>
</body>
</html>
