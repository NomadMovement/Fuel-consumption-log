<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fuel-log v6</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">
    <style>
        /* 基本変数（ライトモード） */
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --header-bg: #2c3e50;
            --text-main: #333333;
            --text-sub: #666666;
            --accent: #3498db;
            --month-bar: #e3f2fd;
            --month-text: #01579b;
            --border: #eeeeee;
            --input-bg: #ffffff;
            --warn: #e74c3c;
            --map: #27ae60;
            --eff: #e67e22;
        }

        /* ダークモード設定（端末の設定がダークの時に自動適用） */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212;
                --card-bg: #1e1e1e;
                --header-bg: #000000;
                --text-main: #e0e0e0;
                --text-sub: #aaaaaa;
                --accent: #3498db;
                --month-bar: #1a2733;
                --month-text: #90caf9;
                --border: #333333;
                --input-bg: #2c2c2c;
            }
        }

        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text-main); padding-bottom: 50px; transition: background 0.3s; }
        header { background: var(--header-bg); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .alert-bar { background: var(--warn); color: white; padding: 10px; text-align: center; font-weight: bold; font-size: 0.9rem; display: none; }
        .form-box { background: var(--card-bg); margin: 10px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .form-box input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-size: 16px; background: var(--input-bg); color: var(--text-main); }
        .btn-save { background: var(--accent); color: white; border: none; width: 100%; padding: 12px; border-radius: 6px; font-weight: bold; margin-top: 10px; }
        .tab-bar { display: flex; overflow-x: auto; background: var(--card-bg); border-bottom: 1px solid var(--border); }
        .tab { padding: 12px 20px; white-space: nowrap; cursor: pointer; color: var(--text-sub); border-bottom: 3px solid transparent; }
        .tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); font-weight: bold; }
        .month-header { background: var(--month-bar); padding: 10px 15px; border-left: 5px solid var(--accent); font-size: 0.8rem; display: flex; flex-direction: column; margin-top: 15px; font-weight: bold; color: var(--month-text); }
        .month-summary { display: flex; justify-content: space-between; margin-top: 2px; font-size: 0.75rem; color: var(--text-sub); }
        .card { background: var(--card-bg); padding: 15px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; gap: 4px; position: relative; }
        .card .date { grid-column: 1/3; font-weight: bold; color: var(--text-main); display: flex; justify-content: space-between; align-items: center; }
        .time-label { font-size: 0.75rem; color: var(--text-sub); font-weight: normal; margin-left: 5px; }
        .unit-price { font-size: 0.75rem; color: var(--text-sub); margin-left: 8px; font-weight: normal; }
        .card .actions { display: flex; gap: 12px; color: var(--text-sub); align-items: center; }
        .card .eff { text-align: right; color: var(--eff); font-weight: bold; font-size: 1.2rem; }
        .map-link { color: var(--map); text-decoration: none; font-size: 0.75rem; font-weight: bold; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; overflow-y: auto; }
        .modal-content { background: var(--card-bg); margin: 20px; padding: 20px; border-radius: 15px; color: var(--text-main); }
        .stats-box { background: var(--bg); padding: 15px; border-radius: 8px; margin-top: 10px; font-size: 0.9rem; line-height: 1.8; color: var(--text-main); }
    </style>
</head>
<body>

<header>
    <div id="current-car-display">読み込み中...</div>
    <button onclick="toggleModal()" style="background:none; border:none; color:white; font-size: 1.4rem;"><i class="fas fa-cog"></i></button>
</header>

<div id="alarm-banner" class="alert-bar">
    <i class="fas fa-exclamation-triangle"></i> <span id="alarm-text">警告</span>
</div>

<div class="tab-bar" id="car-tabs"></div>

<div class="form-box">
    <input type="hidden" id="edit-id">
    <input type="number" id="dist" placeholder="走行距離 (km)" inputmode="decimal">
    <div style="display:flex; gap:10px;">
        <input type="number" id="fuel" placeholder="給油量 (L)" inputmode="decimal">
        <input type="number" id="price" placeholder="金額 (円)" inputmode="numeric">
    </div>
    <input type="text" id="memo" placeholder="メモ">
    <button class="btn-save" id="btn-submit" onclick="addRecord()">記録を保存する</button>
    <button id="btn-cancel" style="display:none; background:#999; margin-top:5px;" class="btn-save" onclick="cancelEdit()">修正を中止する</button>
</div>

<div id="list-container"></div>

<div id="modal">
    <div class="modal-content">
        <h3><i class="fas fa-chart-bar"></i> 統計 (<span class="car-label"></span>)</h3>
        <div id="stats-area" class="stats-box"></div>
        <h3><i class="fas fa-bell"></i> アラーム (km)</h3>
        <input type="number" id="alarm-input" onchange="updateAlarm(this.value)">
        <h3><i class="fas fa-car"></i> 車両設定</h3>
        <div id="car-names-input"></div>
        <hr>
        <button class="btn-save" style="background:#2ecc71;" onclick="exportCSV()">全データCSVバックアップ</button>
        <button class="btn-save" style="background:#e74c3c; margin-top:10px;" onclick="toggleModal()">閉じる</button>
    </div>
</div>

<script>
// ★Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBP_FmmHPoTKJ0c73syYfJGcf88JMca_aI",
  authDomain: "fuel-consumption-log-102e0.firebaseapp.com",
  projectId: "fuel-consumption-log-102e0",
  storageBucket: "fuel-consumption-log-102e0.firebasestorage.app",
  messagingSenderId: "662071411255",
  appId: "1:662071411255:web:f907cbf3dbd0920bb175b2",
  measurementId: "G-NWNNFXQDE2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentCarIndex = 0;
let carNames = JSON.parse(localStorage.getItem('carNames')) || ["車両名1", "車両名2", "車両名3", "車両名4", "車両名5"];
let alarms = JSON.parse(localStorage.getItem('alarms')) || [0, 0, 0, 0, 0];

function init() {
    renderTabs(); renderNameSettings();
    document.getElementById('alarm-input').value = alarms[currentCarIndex] || "";
    loadRecords();
}

function getPosition() {
    return new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(resolve, () => resolve(null), {timeout: 6000});
    });
}

async function addRecord() {
    const d = parseFloat(document.getElementById('dist').value);
    const f = parseFloat(document.getElementById('fuel').value);
    const p = parseFloat(document.getElementById('price').value);
    const m = document.getElementById('memo').value;
    const editId = document.getElementById('edit-id').value;
    if(!d || !f || !p) return alert("数値を入力してください");

    if(editId) {
        await db.collection("records").doc(editId).update({ dist: d, fuel: f, price: p, memo: m });
    } else {
        let loc = null;
        const pos = await getPosition();
        if(pos) loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        await db.collection("records").add({
            carId: currentCarIndex, dist: d, fuel: f, price: p, memo: m, loc: loc,
            date: firebase.firestore.FieldValue.serverTimestamp()
        });
    }
    loadRecords(); cancelEdit();
}

async function loadRecords() {
    const listDiv = document.getElementById('list-container');
    const snap = await db.collection("records").where("carId", "==", currentCarIndex).orderBy("date", "desc").get();
    let html = ""; let curM = ""; let mF = 0; let mP = 0; let mC = "";
    let tF = 0; let tP = 0; let maxD = 0; let minD = 0;
    const docs = snap.docs;
    if(docs.length === 0) { listDiv.innerHTML = "<p style='text-align:center;padding:20px;'>記録がありません</p>"; checkAlarm(0); return; }

    docs.forEach((doc, i) => {
        const d = doc.data(); 
        const dt = d.date ? d.date.toDate() : new Date();
        const timeStr = dt.getHours().toString().padStart(2, '0') + ":" + dt.getMinutes().toString().padStart(2, '0');
        const mS = `${dt.getFullYear()}年${dt.getMonth()+1}月`;
        const unitPrice = Math.round(d.price / d.fuel);
        
        let eff = "---"; 
        if(i < docs.length - 1) eff = ((d.dist - docs[i+1].data().dist) / d.fuel).toFixed(2);
        
        if (curM !== "" && curM !== mS) { html += renderMS(curM, mF, mP, mC); mF = 0; mP = 0; mC = ""; }
        curM = mS; mF += d.fuel; mP += d.price; tF += d.fuel; tP += d.price;
        if(i === 0) maxD = d.dist; minD = d.dist;
        
        let mapBtn = d.loc ? `<a class="map-link" href="https://www.google.com/maps/search/?api=1&query=${d.loc.lat},${d.loc.lng}" target="_blank"><i class="fas fa-map-marker-alt"></i> マップ</a>` : "";

        mC += `<div class="card">
                <div class="date">
                    <div>${dt.getMonth()+1}/${dt.getDate()}<span class="time-label">${timeStr}</span><span class="unit-price">¥${unitPrice}/L</span></div>
                    <div class="actions">${mapBtn}<i class="fas fa-edit" onclick="editMode('${doc.id}',${d.dist},${d.fuel},${d.price},'${d.memo||''}')"></i><i class="fas fa-trash" onclick="deleteRecord('${doc.id}')"></i></div>
                </div>
                <div style="grid-column:1/3;font-size:0.8rem;color:var(--text-sub);">累計: ${d.dist.toLocaleString()} km <span style="margin-left:10px;">${d.memo||''}</span></div>
                <div>${d.fuel}L / ¥${d.price.toLocaleString()}</div>
                <div class="eff">${eff} <small style="font-size:0.6rem;">km/L</small></div>
              </div>`;
    });
    html += renderMS(curM, mF, mP, mC); listDiv.innerHTML = html;
    
    const avgUnitPrice = tF > 0 ? Math.round(tP / tF) : 0;
    document.getElementById('stats-area').innerHTML = `
        <b>生涯平均燃費:</b> ${(tF>0?((maxD-minD)/tF).toFixed(2):0)} km/L<br>
        <b>生涯平均単価:</b> ¥${avgUnitPrice}/L<br>
        <b>累計支出総額:</b> ¥${tP.toLocaleString()}<br>
        <b>累計給油総量:</b> ${tF.toFixed(1)} L
    `;
    checkAlarm(maxD);
}

function renderMS(t, f, p, c) { 
    const avg = f > 0 ? Math.round(p / f) : 0;
    return `<div class="month-header">
                <span>${t}</span>
                <div class="month-summary">
                    <span>合計: ${f.toFixed(1)}L / ¥${p.toLocaleString()}</span>
                    <span>平均単価: ¥${avg}/L</span>
                </div>
            </div>${c}`; 
}

async function exportCSV() {
    const snap = await db.collection("records").orderBy("date", "asc").get();
    let csv = "日付,時間,車両名,走行距離,給油量,金額,単価,燃費,メモ\n";
    let lasts = {};
    snap.forEach(doc => {
        const d = doc.data(); const dt = d.date ? d.date.toDate() : new Date();
        const dStr = dt.toLocaleDateString('ja-JP');
        const tStr = dt.getHours().toString().padStart(2, '0') + ":" + dt.getMinutes().toString().padStart(2, '0');
        const uP = Math.round(d.price / d.fuel);
        let eff = "---"; if (lasts[d.carId]) eff = ((d.dist - lasts[d.carId]) / d.fuel).toFixed(2);
        lasts[d.carId] = d.dist;
        csv += `${dStr},${tStr},${carNames[d.carId]},${d.dist},${d.fuel},${d.price},${uP},${eff},${d.memo||""}\n`;
    });
    window.location.href = `mailto:?subject=燃費ログバックアップ&body=${encodeURIComponent(csv)}`;
}

function editMode(id, d, f, p, m) { 
    document.getElementById('edit-id').value = id; document.getElementById('dist').value = d; 
    document.getElementById('fuel').value = f; document.getElementById('price').value = p; 
    document.getElementById('memo').value = m; document.getElementById('btn-submit').innerText = "修正内容を保存"; 
    document.getElementById('btn-cancel').style.display = "block"; window.scrollTo(0,0); 
}
function cancelEdit() { 
    document.getElementById('edit-id').value = ""; document.querySelectorAll('.form-box input').forEach(i => i.value = ""); 
    document.getElementById('btn-submit').innerText = "記録を保存する"; document.getElementById('btn-cancel').style.display = "none"; 
}
async function deleteRecord(id) { if(confirm("この記録を削除しますか？")) { await db.collection("records").doc(id).delete(); loadRecords(); } }
function updateAlarm(v) { alarms[currentCarIndex] = parseFloat(v)||0; localStorage.setItem('alarms', JSON.stringify(alarms)); loadRecords(); }
function checkAlarm(d) { const l = alarms[currentCarIndex]; const b = document.getElementById('alarm-banner'); b.style.display = (l>0 && d>=l) ? "block" : "none"; }
function switchCar(i) { currentCarIndex = i; cancelEdit(); document.getElementById('alarm-input').value = alarms[i]||""; renderTabs(); loadRecords(); }
function renderTabs() { 
    document.getElementById('car-tabs').innerHTML = carNames.map((n, i) => `<div class="tab ${i===currentCarIndex?'active':''}" onclick="switchCar(${i})">${n}</div>`).join(''); 
    document.getElementById('current-car-display').innerText = carNames[currentCarIndex]; 
    document.querySelectorAll('.car-label').forEach(e => e.innerText = carNames[currentCarIndex]); 
}
function renderNameSettings() { document.getElementById('car-names-input').innerHTML = carNames.map((n, i) => `<div>車${i+1}: <input type="text" value="${n}" onchange="updateCN(${i},this.value)"></div>`).join(''); }
function updateCN(i, v) { carNames[i] = v; localStorage.setItem('carNames', JSON.stringify(carNames)); renderTabs(); }
function toggleModal() { const m = document.getElementById('modal'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
init();
</script>
</body>
</html>
